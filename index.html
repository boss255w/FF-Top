<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FF PREMIUM SHOP - รับเพชรฟรี</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background: #0f172a; color: white; overflow-x: hidden; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .package-card { transition: 0.2s; cursor: pointer; border: 1px solid rgba(255, 255, 255, 0.1); }
        #jumpscare-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: black; z-index: 9999; justify-content: center; align-items: center; flex-direction: column;
        }
        #jumpscare-overlay img { width: 90%; max-height: 80%; object-fit: contain; }
    </style>
</head>
<body class="pb-10">

    <nav class="p-6 glass text-center sticky top-0 z-50">
        <h1 class="text-2xl font-bold text-white uppercase italic">FF <span class="text-purple-500">FREE</span> DIAMOND</h1>
        <p class="text-[10px] text-green-400 mt-1 uppercase tracking-widest font-bold">● SERVER READY (GIFT SYSTEM)</p>
    </nav>

    <main class="max-w-md mx-auto px-4 mt-8" id="main-content">
        <div class="glass p-5 rounded-2xl mb-6 border border-purple-500/20">
            <h2 class="text-sm font-semibold mb-4 text-purple-300">1. ข้อมูลผู้เล่น</h2>
            <input type="number" id="uidInput" placeholder="กรอก UID ของคุณที่นี่" class="w-full p-4 rounded-xl bg-black/50 border border-white/10 outline-none text-white focus:border-purple-500">
        </div>

        <h2 class="text-sm font-semibold mb-3 text-purple-300 pl-1">2. เลือกจำนวนเพชร</h2>
        <div class="grid grid-cols-1 gap-3 mb-8">
            <div class="package-card p-4 rounded-2xl flex justify-between items-center bg-white/5 border-purple-500/50 bg-purple-500/10">
                <div class="flex items-center gap-3">
                    <img src="https://i.ibb.co/L9Y00kH/freefire-diamond.png" class="w-10 h-10">
                    <p class="font-bold text-lg">2,180 Diamonds</p>
                </div>
                <p class="text-purple-400 font-bold">ฟรี</p>
            </div>
        </div>

        <button onclick="startPrank(this)" class="w-full bg-gradient-to-r from-purple-600 to-blue-600 p-5 rounded-2xl font-bold text-white shadow-lg active:scale-95 transition-all text-xl">
            ยืนยันและรับเพชร
        </button>
    </main>

    <div id="jumpscare-overlay">
        <h1 class="text-red-600 font-bold text-3xl mb-6 animate-bounce">โดนเข้าให้แล้วไอ้ทิ่ว! 💀</h1>
        <img src="https://images2.imgbox.com/64/7e/YqfH2Q6n_o.jpg" alt="Prank Gorilla">
        <button onclick="location.reload()" class="mt-8 text-gray-500 text-sm underline">กดเพื่อกลับหน้าหลัก</button>
    </div>

    <script>
        function startPrank(btn) {
            const uid = document.getElementById('uidInput').value;
            if(uid === "") { alert("กรุณากรอก UID ก่อนครับ!"); return; }

            btn.innerHTML = "กำลังตรวจสอบ UID...";
            btn.disabled = true;

            setTimeout(() => {
                btn.innerHTML = "กำลังส่งเพชรเข้าบัญชี...";
                setTimeout(() => {
                    document.getElementById('jumpscare-overlay').style.display = 'flex';
                }, 1500);
            }, 1000);
        }
    </script>

</body>
</html>
