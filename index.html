<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FF PREMIUM SHOP - รับเพชรฟรี</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background: #0f172a; color: white; margin: 0; overflow-x: hidden; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        #jumpscare-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: black; z-index: 9999; justify-content: center; align-items: center; flex-direction: column;
        }
        #jumpscare-overlay img { width: 90%; max-width: 500px; height: auto; border: 4px solid red; }
    </style>
</head>
<body>

    <nav class="p-6 glass text-center">
        <h1 class="text-2xl font-bold text-white uppercase italic">FF <span class="text-purple-500">FREE</span> DIAMOND</h1>
        <p class="text-[10px] text-green-400 mt-1 font-bold tracking-widest">● SERVER ONLINE</p>
    </nav>

    <main class="max-w-md mx-auto px-4 mt-8">
        <div class="glass p-5 rounded-2xl mb-6 border border-purple-500/20">
            <h2 class="text-sm font-semibold mb-4 text-purple-300">1. ข้อมูลผู้เล่น</h2>
            <input type="number" id="uidInput" placeholder="กรอก UID ของคุณที่นี่" class="w-full p-4 rounded-xl bg-black/50 border border-white/10 outline-none text-white focus:border-purple-500 text-lg">
        </div>

        <div class="grid grid-cols-1 gap-3 mb-8">
            <div class="p-5 rounded-3xl flex justify-between items-center border border-purple-500/50 bg-purple-500/10">
                <div class="flex items-center gap-4">
                    <img src="https://i.ibb.co/L9Y00kH/freefire-diamond.png" class="w-12 h-12 object-contain">
                    <p class="font-bold text-xl">2,180 Diamonds</p>
                </div>
                <p class="text-purple-400 font-bold text-xl">ฟรี</p>
            </div>
        </div>

        <button onclick="startPrank(this)" class="w-full bg-gradient-to-r from-purple-600 to-blue-600 p-5 rounded-2xl font-bold text-white shadow-lg active:scale-95 transition-all text-xl">
            ยืนยันและรับเพชรฟรี
        </button>
    </main>

    <div id="jumpscare-overlay">
        <h1 class="text-red-600 font-bold text-3xl mb-6 text-center animate-bounce">โดนเข้าให้แล้วไอ้ทิ่ว! 💀</h1>
        <img src="https://images2.imgbox.com/64/7e/YqfH2Q6n_o.jpg" alt="Joke Image">
        <button onclick="location.reload()" class="mt-8 text-gray-500 underline">กดเพื่อกลับไปเติมใหม่ (หยอกๆ)</button>
    </div>

    <script>
        function startPrank(btn) {
            const uid = document.getElementById('uidInput').value;
            if(uid === "") { alert("กรุณากรอก UID ก่อนรับเพชรครับ!"); return; }

            btn.innerHTML = "กำลังตรวจสอบบัญชี...";
            btn.disabled = true;

            setTimeout(() => {
                btn.innerHTML = "กำลังโอนเพชร...";
                setTimeout(() => {
                    document.getElementById('jumpscare-overlay').style.display = 'flex';
                }, 1500);
            }, 1000);
        }
    </script>
</body>
</html>
