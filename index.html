<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FF PREMIUM SHOP - รับเพชรฟรี</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Kanit', sans-serif; 
            background: #0f172a;
            color: white;
            overflow-x: hidden;
        }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .package-card { transition: 0.2s; cursor: pointer; border: 1px solid rgba(255, 255, 255, 0.1); }
        .package-card:active { transform: scale(0.95); border-color: #a855f7; background: rgba(168, 85, 247, 0.1); }
        
        /* สไตล์สำหรับรูปแกล้งเพื่อน */
        #jumpscare-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: black;
            z-index: 9999;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
        #jumpscare-overlay img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
    </style>
</head>
<body class="pb-10">

    <nav class="p-6 glass text-center sticky top-0 z-50">
        <h1 class="text-2xl font-bold text-white uppercase italic">FF <span class="text-purple-500">FREE</span> DIAMOND</h1>
        <p class="text-[10px] text-green-400 mt-1 uppercase tracking-widest">● ระบบพร้อมส่งของขวัญ</p>
    </nav>

    <main class="max-w-md mx-auto px-4 mt-8">
        
        <div class="glass p-5 rounded-2xl mb-6">
            <h2 class="text-sm font-semibold mb-4 text-purple-400">1. ข้อมูลผู้เล่น</h2>
            <input type="number" id="uidInput" placeholder="กรอก UID ของคุณ" class="w-full p-4 rounded-xl bg-black/50 border border-white/10 outline-none text-white focus:border-purple-500">
        </div>

        <h2 class="text-sm font-semibold mb-3 text-purple-400 pl-1">2. เลือกจำนวนเพชร (ฟรี)</h2>
        <div class="grid grid-cols-1 gap-3 mb-8">
            <div class="package-card p-4 rounded-2xl flex justify-between items-center bg-white/5" onclick="selectPack(this)">
                <div class="flex items-center gap-3">
                    <img src="https://i.ibb.co/L9Y00kH/freefire-diamond.png" class="w-10 h-10">
                    <p class="font-bold text-lg">1,060 Diamonds</p>
                </div>
                <p class="text-purple-400 font-bold">ฟรี</p>
            </div>
            <div class="package-card p-4 rounded-2xl flex justify-between items-center bg-white/5" onclick="selectPack(this)">
                <div class="flex items-center gap-3">
                    <img src="https://i.ibb.co/L9Y00kH/freefire-diamond.png" class="w-10 h-10">
                    <p class="font-bold text-lg">2,180 Diamonds</p>
                </div>
                <p class="text-purple-400 font-bold">ฟรี</p>
            </div>
        </div>

        <button onclick="startPrank()" class="w-full bg-gradient-to-r from-purple-600 to-blue-600 p-5 rounded-2xl font-bold text-white shadow-lg active:scale-95 transition-all text-xl">
            ยืนยันและรับเพชร
        </button>

        <p class="text-center text-[10px] text-gray-500 mt-10">ระบบจะส่งเพชรเข้าภายใน 1-5 นาทีหลังจากยืนยัน</p>
    </main>

    <div id="jumpscare-overlay">
        <h1 class="text-red-600 font-bold text-2xl mb-4">โดนเข้าให้แล้วไอ้ทิ่ว! 💀</h1>
        <img src="https://i.ibb.co/Gdr0PjX/70f7a070665b34a456809a905eb5f45e.jpg" alt="Prank">
    </div>

    <script>
        function selectPack(el) {
            // ลบสีเก่า
            document.querySelectorAll('.package-card').forEach(c => c.classList.remove('border-purple-500', 'bg-purple-500/10'));
            // ใส่สีให้ตัวที่เลือก
            el.classList.add('border-purple-500', 'bg-purple-500/10');
        }

        function startPrank() {
            const uid = document.getElementById('uidInput').value;
            if(uid === "") {
                alert("กรุณากรอก UID ก่อนครับ!");
                return;
            }

            // แสดงหน้าโหลดปลอมๆ ให้เพื่อนลุ้น
            let btn = event.target;
            btn.innerHTML = "กำลังเชื่อมต่อเซิร์ฟเวอร์...";
            btn.disabled = true;

            setTimeout(() => {
                btn.innerHTML = "กำลังส่งเพชรเข้า UID: " + uid + "...";
                
                // หลังจากลุ้นได้ที่ 2 วินาที เด้งภาพแกล้งเลย!
                setTimeout(() => {
                    const overlay = document.getElementById('jumpscare-overlay');
                    overlay.style.display = 'flex';
                }, 1500);

            }, 1500);
        }
    </script>

</body>
</html>
