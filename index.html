<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FF PREMIUM SHOP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background: linear-gradient(rgba(20, 10, 40, 0.85), rgba(10, 5, 20, 0.95)), url('https://img5.pic.in.th/file/secure-sv1/1000018076.jpg'); background-size: cover; background-position: center; background-attachment: fixed; color: white; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .package-card { transition: 0.3s; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); cursor: pointer; }
        .package-card:hover { border-color: #a855f7; transform: translateY(-3px); background: rgba(139, 92, 246, 0.1); }
        @keyframes scroll { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
        .announcement { white-space: nowrap; overflow: hidden; position: relative; background: rgba(168, 85, 247, 0.2); }
        .announcement p { display: inline-block; animation: scroll 15s linear infinite; }
    </style>
</head>
<body class="pb-10">
    <div class="announcement py-2 text-[10px] text-purple-300 border-b border-purple-500/30">
        <p>✅ ยินดีด้วย UID 542*** เติมสำเร็จ 520 เพชร | ✅ ยินดีด้วย UID 901*** เติมสำเร็จ 77 เพชร | ✅ ยินดีด้วย UID 228*** เติมสำเร็จ 310 เพชร</p>
    </div>
    <nav class="p-4 glass text-center sticky top-0 z-50">
        <h1 class="text-2xl font-bold tracking-tighter text-white">FF <span class="text-purple-500">PREMIUM</span> SHOP</h1>
        <p class="text-[10px] text-gray-400 uppercase tracking-widest">● ONLINE</p>
    </nav>
    <main class="max-w-md mx-auto px-4 mt-6">
        <div class="glass p-5 rounded-2xl mb-6">
            <h2 class="text-sm font-semibold mb-3 text-purple-400">1. ข้อมูลผู้เล่น</h2>
            <input type="number" placeholder="ใส่รหัส UID ของคุณ" class="w-full p-4 rounded-xl bg-black/40 border border-white/10 text-white">
        </div>
                <h2 class="text-sm font-semibold mb-3 text-purple-400">2. เลือกแพ็กเกจ</h2>
        <div class="grid grid-cols-1 gap-3 mb-8">
            <div class="package-card p-4 rounded-2xl flex justify-between items-center"><div class="flex items-center gap-3"><img src="https://ff.garena.com/static/images/diamond.png" class="w-8"><p class="font-bold">77 เพชร</p></div><p class="text-xl font-bold text-purple-400">฿5</p></div>
            <div class="package-card p-4 rounded-2xl flex justify-between items-center border-purple-500/50"><div class="flex items-center gap-3"><img src="https://ff.garena.com/static/images/diamond.png" class="w-8"><p class="font-bold">310 เพชร</p></div><p class="text-xl font-bold text-purple-400">฿10</p></div>
            <div class="package-card p-4 rounded-2xl flex justify-between items-center"><div class="flex items-center gap-3"><img src="https://ff.garena.com/static/images/diamond.png" class="w-8"><p class="font-bold">520 เพชร</p></div><p class="text-xl font-bold text-purple-400">฿20</p></div>
        </div>
        <button onclick="alert('ระบบกำลังนำคุณไปยังช่องทางชำระเงิน...')" class="w-full bg-gradient-to-r from-purple-600 to-pink-600 text-white font-bold py-4 rounded-2xl text-lg shadow-lg">ชำระเงินทันที</button>
    </main>
</body>
</html>
