<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FF Shop - บริการเติมเพชรราคาถูก</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Kanit', sans-serif; 
            /* ใส่รูปภาพที่คุณต้องการเป็นพื้นหลัง */
            background-image: linear-gradient(rgba(45, 27, 78, 0.85), rgba(26, 18, 40, 0.85)), url('https://img5.pic.in.th/file/secure-sv1/1000018076.jpg'); 
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: white; 
        }
        .card-item { 
            background: rgba(45, 27, 78, 0.7); 
            backdrop-filter: blur(8px);
            transition: 0.3s; 
            border: 1px solid #6b46c1; 
        }
        .card-item:hover { 
            border-color: #a855f7; 
            transform: translateY(-5px); 
            background: rgba(88, 56, 153, 0.8);
        }
        .btn-purple { 
            background: linear-gradient(90deg, #8b5cf6, #d946ef); 
            transition: 0.3s; 
        }
    </style>
</head>
<body class="pb-10">

    <nav class="p-4 border-b border-purple-800/50 bg-[#1a1228]/80 sticky top-0 z-50 backdrop-blur-md">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold text-purple-400">FF <span class="text-white">TOPUP</span></h1>
            <div class="space-x-4 text-sm">
                <a href="#" class="hover:text-purple-300">หน้าแรก</a>
                <a href="#" class="bg-purple-600 px-3 py-1 rounded text-white">ติดต่อเจ้าหน้าที่</a>
            </div>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto px-4 mt-8">
        
        <div class="bg-purple-600/20 border border-purple-500/40 p-4 rounded-xl mb-8 text-center">
            <p class="text-purple-200 text-sm italic">✨ โปรโมชั่นพิเศษ: ราคาถูกที่สุดในตลาด! ✨</p>
        </div>

        <section class="mb-8">
            <h2 class="text-xl font-semibold mb-4 flex items-center">
                <span class="bg-purple-500 w-7 h-7 rounded-full flex items-center justify-center mr-2 text-sm text-white">1</span>
                กรอก ID ผู้เล่น
            </h2>
            <div class="card-item p-6 rounded-2xl shadow-lg">
                <input type="number" placeholder="กรอก UID (เช่น 123456789)" 
                    class="w-full p-4 rounded-xl bg-black/40 border border-purple-700/50 focus:outline-none focus:border-purple-400 text-white text-lg">
            </div>
        </section>

        <section class="mb-8">
            <h2 class="text-xl font-semibold mb-4 flex items-center">
                <span class="bg-purple-500 w-7 h-7 rounded-full flex items-center justify-center mr-2 text-sm text-white">2</span>
                เลือกแพ็กเกจเพชร
            </h2>
            
            <div class="grid grid-cols-2 sm:grid-cols-3 gap-4">
                <div class="card-item p-5 rounded-2xl text-center cursor-pointer relative overflow-hidden">
                    <img src="https://img5.pic.in.th/file/secure-sv1/diamond_icon.png" class="w-10 mx-auto mb-2">
                    <p class="font-bold">77 Diamonds</p>
                    <p class="text-purple-300 font-bold text-xl">฿5</p>
                </div>

                <div class="card-item p-5 rounded-2xl text-center cursor-pointer border-purple-400 shadow-xl">
                    <div class="absolute top-0 right-0 bg-red-500 text-[10px] px-2 py-0.5 rounded-bl-lg">คุ้มมาก</div>
                    <img src="https://img5.pic.in.th/file/secure-sv1/diamond_icon.png" class="w-10 mx-auto mb-2">
                    <p class="font-bold">310 Diamonds</p>
                    <p class="text-purple-300 font-bold text-xl">฿10</p>
                </div>

                <div class="card-item p-5 rounded-2xl text-center cursor-pointer">
                    <div class="absolute top-0 right-0 bg-yellow-500 text-[10px] px-2 py-0.5 rounded-bl-lg text-black">แนะนำ</div>
                    <img src="https://img5.pic.in.th/file/secure-sv1/diamond_icon.png" class="w-10 mx-auto mb-2">
                    <p class="font-bold">520 Diamonds</p>
                    <p class="text-purple-300 font-bold text-xl">฿20</p>
                </div>
            </div>
        </section>

        <section class="mb-8 text-center">
            <button onclick="orderNow()" class="w-full btn-purple text-white font-bold py-4 rounded-2xl text-xl shadow-lg transform active:scale-95 transition">
                ชำระเงินทันที
            </button>
            <p class="text-gray-400 text-xs mt-4 italic">หมายเหตุ: ราคานี้เฉพาะวันนี้เท่านั้น</p>
        </section>

    </main>

    <script>
        function orderNow() {
            alert("ขอบคุณที่ใช้บริการ! \nขณะนี้ระบบกำลังตรวจสอบ UID และเตรียมช่องทางชำระเงิน");
        }
    </script>

</body>
</html>
